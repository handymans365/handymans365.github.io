<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: "en" }}">

  {%- include head.html -%}

  <body>

  {% unless page.url == '/' %}
    {%- include views/header.html -%}
    {%- include views/banner.html -%}
  {% endunless %}


  <main class="page-content" aria-label="Content">

  {% if page.url == '/' %}
    {{ content }}
  {% else %}
    <div class="wrapper">
      {{ content }}
    </div>
  {% endif %}

  </main>

  {%- include views/footer.html -%}

  </body>
</html>
